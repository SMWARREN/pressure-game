<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0a0f1c"/>

  <!-- subtle pressure glow -->
  <circle cx="32" cy="30" r="22" fill="rgba(239,68,68,0.25)"/>

  <!-- Pipe "P" (shifted left + slightly up) -->
