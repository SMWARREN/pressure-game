        stroke="url(#grad)"
        stroke-width="6"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- gradient from your theme -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#5b6cff"/>
      <stop offset="100%" stop-color="#00e0ff"/>
    </linearGradient>
  </defs>
</svg>