# SonarQube Project Configuration
# Run analysis with: npm run sonar:analyze

# Project identification
sonar.projectKey=pressure-game
sonar.projectName=Pressure Game
sonar.projectVersion=1.0.0

# Source code
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# TypeScript configuration
sonar.typescript.tsconfigPath=./tsconfig.json
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusions
# Exclude CLI tools (not part of main game, generate -450 issues)
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,src/cli/**
sonar.coverage.exclusions=**/types.ts,**/*.d.ts,**/*.test.ts,**/*.test.tsx,src/cli/**

# Code quality gates
sonar.qualitygate.wait=true
